<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mortgage Protection Funnel — 5-Layer Adaptive Demo</title>
<link href="https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,600;0,700;1,500&family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}

:root{
  --navy:#0c1d38;
  --navy2:#1a3260;
  --gold:#c8912f;
  --gold2:#e8b45a;
  --cream:#f8f4ed;
  --white:#ffffff;
  --red:#d94f4f;
  --orange:#d97a2a;
  --yellow:#c8a030;
  --green:#2a9060;
  --gray1:#f0eee9;
  --gray2:#e0ddd7;
  --text:#1a1a2e;
  --textmid:#4a5270;
  --textlight:#8a93a8;
  --r:14px;
  --shadow:0 24px 64px rgba(12,29,56,0.18);
}

body{
  font-family:'Outfit',sans-serif;
  background:#0c1d38;
  min-height:100vh;
  display:flex;align-items:flex-start;justify-content:center;
  padding:24px 16px 48px;
  position:relative;
  overflow-x:hidden;
}

body::before{
  content:'';position:fixed;inset:0;
  background:
    radial-gradient(ellipse 100% 50% at 0% 0%,rgba(200,145,47,0.1) 0%,transparent 55%),
    radial-gradient(ellipse 80% 80% at 100% 100%,rgba(26,50,96,0.6) 0%,transparent 60%),
    linear-gradient(160deg,#0c1d38 0%,#080f1e 100%);
  pointer-events:none;
}
body::after{
  content:'';position:fixed;inset:0;
  background-image:radial-gradient(rgba(200,145,47,0.08) 1px,transparent 1px);
  background-size:36px 36px;pointer-events:none;
}

.wrapper{width:100%;max-width:500px;position:relative;z-index:1;margin-top:16px;}

/* ── Layer pill ── */
.layer-pill{
  display:flex;align-items:center;justify-content:center;gap:6px;
  margin-bottom:12px;
}
.lp-step{
  width:28px;height:4px;border-radius:4px;
  background:rgba(255,255,255,0.15);
  transition:background 0.4s,width 0.4s;
  position:relative;
}
.lp-step.done{background:var(--gold);}
.lp-step.active{background:var(--gold2);width:40px;}
.lp-label{
  font-size:10px;color:rgba(255,255,255,0.4);letter-spacing:0.8px;
  font-weight:600;text-transform:uppercase;margin-left:6px;
}

/* ── FB chrome ── */
.fb-bar{
  background:#1877f2;border-radius:var(--r) var(--r) 0 0;
  padding:10px 16px;display:flex;align-items:center;gap:8px;
}
.fb-logo{font-family:'Lora',serif;color:#fff;font-size:22px;font-weight:700;}
.fb-sp{font-size:12px;color:rgba(255,255,255,0.85);font-weight:500;}
.fb-badge{margin-left:auto;background:rgba(255,255,255,0.18);color:#fff;font-size:9px;font-weight:700;padding:3px 9px;border-radius:20px;letter-spacing:0.8px;}

.ad-card{background:var(--white);border-radius:0 0 var(--r) var(--r);overflow:hidden;box-shadow:var(--shadow);}

.sponsor-bar{
  padding:12px 16px;display:flex;align-items:center;gap:10px;
  border-bottom:1px solid #f0ede8;
}
.s-avatar{
  width:40px;height:40px;border-radius:50%;flex-shrink:0;
  background:linear-gradient(135deg,var(--navy),var(--navy2));
  display:flex;align-items:center;justify-content:center;
  font-family:'Lora',serif;color:var(--gold);font-size:14px;font-weight:700;
}
.s-name{font-size:14px;font-weight:600;color:#1c1e21;}
.s-tag{font-size:11px;color:#65676b;}
.s-tag span{color:#1877f2;}
.s-dots{font-size:20px;color:#65676b;cursor:pointer;margin-left:auto;}

/* ── Hero ── */
.hero{
  background:linear-gradient(155deg,var(--navy) 0%,var(--navy2) 100%);
  padding:30px 24px 26px;text-align:center;position:relative;overflow:hidden;
}
.hero::before{
  content:'';position:absolute;inset:0;
  background:radial-gradient(ellipse 80% 60% at 50% -10%,rgba(200,145,47,0.18) 0%,transparent 60%);
}
.hero-icon{
  width:60px;height:60px;border-radius:50%;margin:0 auto 14px;
  background:rgba(200,145,47,0.12);border:2px solid rgba(200,145,47,0.25);
  display:flex;align-items:center;justify-content:center;font-size:24px;position:relative;
}
.hero h1{
  font-family:'Lora',serif;color:#fff;font-size:21px;line-height:1.35;
  margin-bottom:8px;position:relative;
}
.hero h1 em{color:var(--gold2);font-style:normal;}
.hero p{color:rgba(255,255,255,0.65);font-size:13px;line-height:1.6;position:relative;max-width:340px;margin:0 auto;}

/* ── Content area ── */
#panel{position:relative;}

/* ── Pre-lander ── */
.preland{padding:24px;background:var(--cream);}
.pl-kicker{
  display:inline-flex;align-items:center;gap:6px;
  background:rgba(200,145,47,0.12);color:var(--gold);
  font-size:10px;font-weight:700;letter-spacing:1px;text-transform:uppercase;
  padding:4px 10px;border-radius:20px;margin-bottom:14px;
}
.pl-headline{
  font-family:'Lora',serif;font-size:18px;color:var(--text);
  line-height:1.4;margin-bottom:12px;
}
.pl-headline em{color:var(--red);font-style:normal;font-weight:700;}
.pl-story{
  background:white;border-radius:10px;padding:14px 16px;
  border-left:3px solid var(--gold);margin-bottom:16px;
}
.pl-story p{font-size:13px;color:var(--textmid);line-height:1.65;}
.pl-story p+p{margin-top:8px;}
.pl-story strong{color:var(--text);}

.stat-row{display:flex;gap:8px;margin-bottom:18px;}
.stat-box{
  flex:1;background:white;border-radius:10px;padding:12px 8px;
  text-align:center;border:1px solid var(--gray2);
}
.stat-n{font-family:'Lora',serif;font-size:19px;font-weight:700;color:var(--navy);}
.stat-l{font-size:10px;color:var(--textlight);margin-top:2px;line-height:1.3;}

/* ── Progress ── */
.prog-wrap{padding:14px 24px 0;background:var(--cream);}
.prog-top{display:flex;justify-content:space-between;font-size:10px;font-weight:700;color:var(--textlight);margin-bottom:5px;text-transform:uppercase;letter-spacing:0.5px;}
.prog-track{height:4px;background:var(--gray2);border-radius:4px;overflow:hidden;}
.prog-fill{height:100%;background:linear-gradient(90deg,var(--navy),var(--gold));border-radius:4px;transition:width 0.5s cubic-bezier(.4,0,.2,1);}

/* ── Branch tag ── */
.branch-tag{
  display:flex;align-items:center;gap:6px;padding:8px 24px 0;
  background:var(--cream);
}
.bt-pip{width:7px;height:7px;border-radius:50%;}
.bt-label{font-size:10px;font-weight:600;letter-spacing:0.5px;text-transform:uppercase;}

/* ── Question ── */
.q-area{background:var(--cream);padding:18px 24px 24px;}
.q-text{
  font-family:'Lora',serif;font-size:17px;color:var(--text);
  line-height:1.45;margin-bottom:16px;min-height:48px;
}
.q-hint{font-size:12px;color:var(--textlight);margin-top:-10px;margin-bottom:14px;line-height:1.5;}

.opts{display:flex;flex-direction:column;gap:9px;}
.opt{
  background:white;border:2px solid var(--gray2);border-radius:11px;
  padding:13px 15px;display:flex;align-items:center;gap:11px;
  cursor:pointer;transition:all 0.18s ease;position:relative;overflow:hidden;
}
.opt:hover{border-color:var(--navy);transform:translateY(-1px);box-shadow:0 4px 14px rgba(12,29,56,0.09);}
.opt.sel{border-color:var(--navy);background:var(--navy);}
.opt.sel .ol{color:white;}
.opt.sel .od{background:var(--gold);border-color:var(--gold);}
.opt.sel .od::after{opacity:1;}
.od{width:19px;height:19px;border:2px solid #ccc;border-radius:50%;flex-shrink:0;position:relative;transition:all 0.18s;}
.od::after{content:'';position:absolute;inset:3px;background:white;border-radius:50%;opacity:0;transition:opacity 0.18s;}
.ol{font-size:14px;font-weight:500;color:var(--text);transition:color 0.18s;}
.opt-sub{font-size:11px;color:var(--textlight);margin-top:1px;}
.opt.sel .opt-sub{color:rgba(255,255,255,0.6);}

/* ── Buttons ── */
.btn{
  width:100%;padding:15px;border:none;border-radius:11px;
  font-family:'Outfit',sans-serif;font-size:14px;font-weight:600;
  cursor:pointer;margin-top:14px;transition:all 0.2s;
  display:flex;align-items:center;justify-content:center;gap:8px;
  letter-spacing:0.2px;
}
.btn:hover{transform:translateY(-2px);}
.btn:disabled{opacity:0.35;cursor:not-allowed;transform:none;}
.btn-primary{background:linear-gradient(135deg,var(--navy) 0%,var(--navy2) 100%);color:white;}
.btn-primary:hover{box-shadow:0 8px 24px rgba(12,29,56,0.28);}
.btn-gold{background:linear-gradient(135deg,var(--gold),var(--gold2));color:var(--navy);font-weight:700;font-size:15px;padding:17px;}
.btn-gold:hover{box-shadow:0 8px 24px rgba(200,145,47,0.35);}
.btn-start{background:linear-gradient(135deg,var(--gold),var(--gold2));color:var(--navy);font-weight:700;font-size:16px;padding:18px;}
.btn-start:hover{box-shadow:0 8px 24px rgba(200,145,47,0.4);}

/* ── Back link ── */
.back-link{
  text-align:center;margin-top:10px;
  font-size:12px;color:var(--textlight);cursor:pointer;
  transition:color 0.15s;
}
.back-link:hover{color:var(--textmid);}

/* ── Results ── */
.result-wrap{background:var(--cream);padding:22px 24px 26px;}
.result-header{
  border-radius:12px;padding:20px;margin-bottom:18px;
  text-align:center;position:relative;overflow:hidden;
}
.rh-icon{font-size:32px;margin-bottom:8px;}
.rh-track{font-size:10px;font-weight:700;letter-spacing:1px;text-transform:uppercase;margin-bottom:6px;opacity:0.8;}
.rh-title{font-family:'Lora',serif;font-size:20px;line-height:1.35;margin-bottom:6px;}
.rh-sub{font-size:13px;opacity:0.75;line-height:1.5;}

.track-red{background:linear-gradient(135deg,#2d0a0a,#4a1010);color:white;}
.track-orange{background:linear-gradient(135deg,#2a1500,#4a2800);color:white;}
.track-yellow{background:linear-gradient(135deg,#201500,#3a2800);color:white;}
.track-green{background:linear-gradient(135deg,#0a2010,#1a3820);color:white;}

.insights-title{font-size:11px;font-weight:700;color:var(--textlight);text-transform:uppercase;letter-spacing:0.8px;margin-bottom:10px;}
.insight-list{display:flex;flex-direction:column;gap:8px;margin-bottom:20px;}
.insight-item{
  display:flex;align-items:flex-start;gap:10px;
  background:white;border-radius:10px;padding:12px 14px;
  border-left:3px solid;
}
.ii-bad{border-color:var(--red);}
.ii-warn{border-color:var(--orange);}
.ii-ok{border-color:var(--yellow);}
.ii-good{border-color:var(--green);}
.ii-icon{font-size:13px;margin-top:1px;flex-shrink:0;}
.ii-text{font-size:13px;color:var(--text);line-height:1.45;}
.ii-text strong{font-weight:600;}

.product-rec{
  background:white;border-radius:12px;padding:16px;
  border:2px solid var(--gray2);margin-bottom:18px;
}
.pr-label{font-size:10px;font-weight:700;color:var(--textlight);text-transform:uppercase;letter-spacing:0.8px;margin-bottom:10px;}
.pr-list{display:flex;flex-direction:column;gap:7px;}
.pr-item{
  display:flex;align-items:center;gap:10px;
  font-size:13px;color:var(--text);padding:4px 0;
}
.pr-check{
  width:20px;height:20px;border-radius:50%;flex-shrink:0;
  display:flex;align-items:center;justify-content:center;font-size:10px;
}
.pr-check.yes{background:rgba(42,144,96,0.12);color:var(--green);}
.pr-check.no{background:rgba(217,79,79,0.1);color:var(--red);}

/* ── Lead form ── */
.lead-wrap{background:var(--cream);padding:22px 24px 26px;}
.lead-header{text-align:center;margin-bottom:16px;}
.lh-title{font-family:'Lora',serif;font-size:19px;color:var(--text);margin-bottom:6px;}
.lh-sub{font-size:13px;color:var(--textmid);line-height:1.55;}

.form-group{display:flex;flex-direction:column;gap:9px;margin-bottom:4px;}
.form-group input{
  width:100%;padding:14px 15px;border:2px solid var(--gray2);border-radius:10px;
  font-family:'Outfit',sans-serif;font-size:14px;color:var(--text);background:white;
  outline:none;transition:border-color 0.18s;
}
.form-group input:focus{border-color:var(--navy);}
.form-group input::placeholder{color:#b8c0cc;}

.trust-row{display:flex;gap:6px;margin:10px 0 14px;flex-wrap:wrap;}
.trust-badge{
  display:flex;align-items:center;gap:4px;
  background:white;border:1px solid var(--gray2);border-radius:6px;
  padding:5px 9px;font-size:10px;font-weight:500;color:var(--textmid);
}

.privacy{font-size:10px;color:var(--textlight);text-align:center;line-height:1.5;margin-top:8px;}

/* ── Thank you ── */
.ty-wrap{background:var(--cream);padding:28px 24px;}
.ty-check{
  width:68px;height:68px;border-radius:50%;
  background:linear-gradient(135deg,var(--green),#3db87a);
  box-shadow:0 8px 24px rgba(42,144,96,0.28);
  display:flex;align-items:center;justify-content:center;
  font-size:28px;margin:0 auto 16px;
}
.ty-title{font-family:'Lora',serif;font-size:21px;color:var(--text);text-align:center;margin-bottom:8px;}
.ty-sub{font-size:13px;color:var(--textmid);text-align:center;line-height:1.6;margin-bottom:20px;max-width:320px;margin-left:auto;margin-right:auto;}

.next-steps{background:white;border-radius:12px;padding:16px;margin-bottom:20px;}
.ns-title{font-size:10px;font-weight:700;color:var(--textlight);text-transform:uppercase;letter-spacing:0.8px;margin-bottom:12px;}
.ns-item{display:flex;align-items:flex-start;gap:10px;padding:8px 0;border-bottom:1px solid var(--gray1);}
.ns-item:last-child{border-bottom:none;padding-bottom:0;}
.ns-num{
  width:24px;height:24px;border-radius:50%;flex-shrink:0;
  background:var(--navy);color:var(--gold);
  font-size:11px;font-weight:700;display:flex;align-items:center;justify-content:center;
}
.ns-text{font-size:13px;color:var(--text);line-height:1.4;}
.ns-text span{display:block;font-size:11px;color:var(--textlight);margin-top:1px;}

.btn-restart{
  display:block;width:100%;padding:13px;border-radius:10px;
  background:transparent;border:2px solid var(--gray2);
  font-family:'Outfit',sans-serif;font-size:13px;font-weight:600;color:var(--textmid);
  cursor:pointer;text-align:center;transition:all 0.18s;
}
.btn-restart:hover{border-color:var(--navy);color:var(--navy);}

/* ── FB bottom bar ── */
.fb-bottom{border-top:1px solid #f0ede8;padding:8px 16px;display:flex;gap:4px;}
.fba{flex:1;padding:8px;display:flex;align-items:center;justify-content:center;gap:6px;border-radius:8px;cursor:pointer;font-size:13px;font-weight:600;color:#65676b;transition:background 0.15s;}
.fba:hover{background:#f0f2f5;}

/* Disqualify */
.disq{padding:28px 24px;background:var(--cream);text-align:center;}
.disq-icon{font-size:36px;margin-bottom:12px;}
.disq-title{font-family:'Lora',serif;font-size:18px;color:var(--text);margin-bottom:8px;}
.disq-sub{font-size:13px;color:var(--textmid);line-height:1.6;margin-bottom:20px;}

/* Animations */
@keyframes up{from{opacity:0;transform:translateY(18px);}to{opacity:1;transform:translateY(0);}}
@keyframes fadein{from{opacity:0;}to{opacity:1;}}
.anim{animation:up 0.35s ease forwards;}
.fadein{animation:fadein 0.3s ease forwards;}

/* Divider */
.div{height:1px;background:var(--gray2);margin:0 0 16px;}
</style>
</head>
<body>
<div class="wrapper">

  <!-- Layer pill indicator -->
  <div class="layer-pill" id="layer-pill">
    <div class="lp-step active" id="lp1"></div>
    <div class="lp-step" id="lp2"></div>
    <div class="lp-step" id="lp3"></div>
    <div class="lp-step" id="lp4"></div>
    <div class="lp-step" id="lp5"></div>
    <div class="lp-label" id="lp-label">Layer 1 of 5 — Ad</div>
  </div>

  <!-- FB chrome -->
  <div class="fb-bar">
    <div class="fb-logo">f</div>
    <div class="fb-sp">Sponsored</div>
    <div class="fb-badge">DEMO</div>
  </div>

  <div class="ad-card">
    <!-- Sponsor -->
    <div class="sponsor-bar">
      <div class="s-avatar">MP</div>
      <div>
        <div class="s-name">MortgageProtect Advisors</div>
        <div class="s-tag"><span>Sponsored</span> · Financial Services</div>
      </div>
      <div class="s-dots">···</div>
    </div>

    <!-- Hero (persistent) -->
    <div class="hero">
      <div class="hero-icon">🏠</div>
      <h1>Would Your Family Keep<br>the Home if You Were <em>Gone?</em></h1>
      <p>Find out in 90 seconds — and discover exactly which type of mortgage protection you actually need.</p>
    </div>

    <!-- Dynamic panel -->
    <div id="panel"></div>

    <!-- FB actions -->
    <div class="fb-bottom">
      <div class="fba">👍 Like</div>
      <div class="fba">💬 Comment</div>
      <div class="fba">↗ Share</div>
    </div>
  </div>

</div>

<script>
// ═══════════════════════════════════════════════════════════
// ✏️  CONFIG — fill these in before going live
// ═══════════════════════════════════════════════════════════
const CONFIG = {
  // Paste your GHL inbound webhook URL here:
  GHL_WEBHOOK: 'https://services.leadconnectorhq.com/hooks/rXx1At6lQNyrFkh9z8J4/webhook-trigger/ed0293f0-fa02-4699-b6bc-320b35ac014b',

  // Paste your Meta Pixel ID here (numbers only, no quotes needed around the value):
  META_PIXEL_ID: 'YOUR_PIXEL_ID_HERE',

  // GHL custom field keys — rename to match yours exactly:
  FIELD_KEYS: {
    firstName:   'first_name',
    lastName:    'last_name',
    phone:       'phone',
    email:       'email',
    zip:         'postal_code',
    ageRange:    'age_range',
    rxCount:     'prescription_count',
    branch:      'quiz_branch',
    branchLabel: 'quiz_branch_label',
    track:       'quiz_track',
    trackLabel:  'quiz_track_label',
    utmSource:   'utm_source',
    utmMedium:   'utm_medium',
    utmCampaign: 'utm_campaign',
    utmContent:  'utm_content',
    fullAnswers: 'quiz_answers_json',
    ipState:     'ip_state',
    ipCity:      'ip_city',
    ipTimezone:  'ip_timezone',
  }
};

// ─────────────────────────────────────────────
// META PIXEL — fires on load + Lead event
// ─────────────────────────────────────────────
(function(f,b,e,v,n,t,s){
  if(f.fbq) return; n=f.fbq=function(){n.callMethod?
  n.callMethod.apply(n,arguments):n.queue.push(arguments)};
  if(!f._fbq)f._fbq=n; n.push=n; n.loaded=!0; n.version='2.0';
  n.queue=[]; t=b.createElement(e); t.async=!0;
  t.src=v; s=b.getElementsByTagName(e)[0];
  s.parentNode.insertBefore(t,s)
})(window,document,'script','https://connect.facebook.net/en_US/fbevents.js');
if(CONFIG.META_PIXEL_ID && CONFIG.META_PIXEL_ID !== 'YOUR_PIXEL_ID_HERE'){
  fbq('init', CONFIG.META_PIXEL_ID);
  fbq('track', 'PageView');
}

// ─────────────────────────────────────────────
// UTM CAPTURE — pulled from URL on load
// ─────────────────────────────────────────────
const UTM = (function(){
  const p = new URLSearchParams(window.location.search);
  return {
    source:   p.get('utm_source')   || '',
    medium:   p.get('utm_medium')   || '',
    campaign: p.get('utm_campaign') || '',
    content:  p.get('utm_content')  || '',
  };
})();

// ─────────────────────────────────────────────
// IP GEOLOCATION — passive, fires on load
// ─────────────────────────────────────────────
(async function(){
  try {
    const r = await fetch('https://ipapi.co/json/');
    const d = await r.json();
    S.ipState    = d.region      || '';
    S.ipCity     = d.city        || '';
    S.ipTimezone = d.timezone    || '';
  } catch(e){ /* silent fail — VPN or blocked */ }
})();

// ─────────────────────────────────────────────
// STATE
// ─────────────────────────────────────────────
const S = {
  layer: 1,
  branch: null,       // 'A' | 'B' | 'C'
  track: null,        // 1 | 2 | 3 | 4
  answers: {},
  history: [],        // question id stack for back nav
  currentQ: null,
  leadName: '',
  ipState: '',
  ipCity: '',
  ipTimezone: '',
};

// ─────────────────────────────────────────────
// LAYER LABELS
// ─────────────────────────────────────────────
const LAYER_LABELS = ['Ad','Pre-Lander','Quiz','Results','Lead Capture'];

function setLayer(n) {
  S.layer = n;
  for(let i=1;i<=5;i++){
    const el = document.getElementById('lp'+i);
    el.className = 'lp-step ' + (i < n ? 'done' : i === n ? 'active' : '');
  }
  document.getElementById('lp-label').textContent = `Layer ${n} of 5 — ${LAYER_LABELS[n-1]}`;
}

// ─────────────────────────────────────────────
// QUESTIONS
// ─────────────────────────────────────────────
const QUESTIONS = {
  screen: {
    id:'screen',

function startQuiz(){
  S.answers = {}; S.history = []; S.branch = null; S.track = null;
  showQuestion('screen');
}

function branchColor(b){
  if(!b) return {bg:'var(--navy)',label:'Screening'};
  if(b==='A') return {bg:'var(--red)',label:'No Coverage Path'};
  if(b==='B') return {bg:'var(--orange)',label:'Employer Coverage Path'};
  if(b==='C') return {bg:'var(--green)',label:'Private Policy Path'};
}

function questionNumber(id){
  const order = ['screen','q1','qa1','qa2','qa3','qb1','qb2','qb3','qc1','qc2','qc3'];
  const totalByBranch = {screen:0,q1:1,qa1:2,qa2:3,qa3:4,qb1:2,qb2:3,qb3:4,qc1:2,qc2:3,qc3:4};
  return (totalByBranch[id]||0)+1;
}

function totalQuestions(){
  // max 5 per branch path
  return 5;
}

function progressPct(id){
  const map = {screen:10,q1:20,q_age:30,q_rx:40,qa1:53,qa2:67,qa3:82,qb1:53,qb2:67,qb3:82,qc1:53,qc2:67,qc3:82};
  return map[id]||10;
}

function showQuestion(id){
  setLayer(3);
  S.currentQ = id;
  const q = QUESTIONS[id];
  if(!q){ showResult(); return; }
  const bc = branchColor(q.branch||null);
  const pct = progressPct(id);

  render(`
    <div class="fadein">
      <div class="prog-wrap">
        <div class="prog-top">
          <span>Quiz</span>
          <span>${pct}% complete</span>
        </div>
        <div class="prog-track"><div class="prog-fill" style="width:${pct}%"></div></div>
      </div>
      ${q.branch ? `
        <div class="branch-tag" style="padding-top:10px;">
          <div class="bt-pip" style="background:${bc.bg}"></div>
          <div class="bt-label" style="color:${bc.bg}">${bc.label}</div>
        </div>` : ''}
      <div class="q-area anim">
        <div class="q-text">${q.q}</div>
        ${q.hint ? `<div class="q-hint">💡 ${q.hint}</div>` : ''}
        <div class="opts" id="opts-wrap">
          ${q.opts.map((o,i)=>`
            <div class="opt" id="opt-${i}" onclick="selectOpt(${i})">
              <div class="od"></div>
              <div>
                <div class="ol">${o.l}</div>
                ${o.sub ? `<div class="opt-sub">${o.sub}</div>`:''}
              </div>
            </div>
          `).join('')}
        </div>
        <button class="btn btn-primary" id="btn-next" disabled onclick="advanceQ()">
          ${id==='qa3'||id==='qb3'||id==='qc3' ? 'See My Results →' : 'Next →'}
        </button>
        ${S.history.length > 0 ? `<div class="back-link" onclick="goBack()">← Back</div>` : ''}
      </div>
    </div>
  `);
}

function selectOpt(i){
  document.querySelectorAll('.opt').forEach(o=>o.classList.remove('sel'));
  document.getElementById('opt-'+i).classList.add('sel');
  document.getElementById('btn-next').disabled = false;
}

function advanceQ(){
  const qdef = QUESTIONS[S.currentQ];
  const sel = selectedOpt();
  if(sel===-1) return;
  S.answers[S.currentQ] = sel;
  S.history.push(S.currentQ);
  const next = qdef.next(sel);
  if(next==='result'){ showResult(); }
  else if(next==='disqualify'){ showDisqualify(); }
  else { showQuestion(next); }
}

function goBack(){
  if(S.history.length===0) return;
  const prev = S.history.pop();
  // reset branch if going back to q1 or screen
  if(prev==='q1'||prev==='screen'){ S.branch=null; }
  showQuestion(prev);
  // restore selection
  setTimeout(()=>{
    const prevAns = S.answers[prev];
    if(prevAns!==undefined){
      const el = document.getElementById('opt-'+prevAns);
      if(el){ el.classList.add('sel'); document.getElementById('btn-next').disabled=false; }
    }
  },50);
}

function selectedOpt(){
  const opts = document.querySelectorAll('.opt');
  for(let i=0;i<opts.length;i++) if(opts[i].classList.contains('sel')) return i;
  return -1;
}

// LAYER 4 — Segmented Results

async function submitLead(){
  // ── Validation ──
  const name  = document.getElementById('f-name').value.trim();
  const phone = document.getElementById('f-phone').value.trim();
  const email = document.getElementById('f-email').value.trim();
  const zip   = document.getElementById('f-zip').value.trim();

  if(!name||!phone||!email||!zip){
    document.querySelectorAll('.form-group input').forEach(inp=>{
      inp.style.borderColor = inp.value.trim() ? 'var(--gray2)' : 'var(--red)';
    });
    return;
  }

  // ── Parse name ──
  const nameParts = name.split(' ');
  const firstName = nameParts[0];
  const lastName  = nameParts.slice(1).join(' ') || '';

  // ── Label maps ──
  const ageLabels  = ['18–30','31–40','41–50','51–60','61+'];
  const rxLabels   = ['None','1–2','3–4','5 or more'];
  const branchMap  = {A:'No Coverage / Unsure', B:'Employer Coverage', C:'Private Policy'};
  const trackMap   = {1:'Critical Gap',2:'Coverage Mismatch',3:'Protection Plateau',4:'Well Protected'};

  // ── Payload for GHL ──
  const K = CONFIG.FIELD_KEYS;
  const payload = {
    [K.firstName]:   firstName,
    [K.lastName]:    lastName,
    [K.phone]:       phone,
    [K.email]:       email,
    [K.zip]:         zip,
    [K.ageRange]:    ageLabels[S.answers.q_age]   || '',
    [K.rxCount]:     rxLabels[S.answers.q_rx]     || '',
    [K.branch]:      S.branch                     || '',
    [K.branchLabel]: branchMap[S.branch]          || '',
    [K.track]:       String(S.track)              || '',
    [K.trackLabel]:  trackMap[S.track]            || '',
    [K.utmSource]:   UTM.source,
    [K.utmMedium]:   UTM.medium,
    [K.utmCampaign]: UTM.campaign,
    [K.utmContent]:  UTM.content,
    [K.fullAnswers]: JSON.stringify(S.answers),
    [K.ipState]:     S.ipState,
    [K.ipCity]:      S.ipCity,
    [K.ipTimezone]:  S.ipTimezone,
  };

  // ── Loading state ──
  const btn = document.querySelector('.lead-wrap .btn');
  const origText = btn ? btn.innerHTML : '';
  if(btn){ btn.disabled = true; btn.innerHTML = '⏳ Submitting…'; }

  // ── Fire Meta Pixel Lead event ──
  if(window.fbq && CONFIG.META_PIXEL_ID !== 'YOUR_PIXEL_ID_HERE'){
    fbq('track', 'Lead', {
      content_name:     trackMap[S.track] || '',
      content_category: branchMap[S.branch] || '',
    });
  }

  // ── POST to GHL webhook ──
  let success = false;
  if(CONFIG.GHL_WEBHOOK && CONFIG.GHL_WEBHOOK !== 'YOUR_GHL_WEBHOOK_URL_HERE'){
    try {
      const res = await fetch(CONFIG.GHL_WEBHOOK, {
        method: 'POST',
        headers: {'Content-Type':'application/json'},
        body: JSON.stringify(payload),
      });
      success = res.ok;
    } catch(err){
      console.error('GHL webhook error:', err);
    }
  } else {
    // Demo mode — no webhook configured, just proceed
    console.log('Demo mode — GHL payload:', payload);
    success = true;
  }

  if(success){
    S.leadName = name;
    showThankYou();
  } else {
    // ── Error state ──
    if(btn){ btn.disabled = false; btn.innerHTML = origText; }
    const errMsg = document.getElementById('webhook-error');
    if(!errMsg){
      const div = document.createElement('div');
      div.id = 'webhook-error';
      div.style.cssText = 'background:#fff0f0;border:1px solid var(--red);border-radius:8px;padding:10px 14px;font-size:12px;color:var(--red);text-align:center;margin-top:10px;line-height:1.5;';
      div.innerHTML = '⚠️ Something went wrong submitting your info. Please try again or call us directly at <strong>+1 (602) 696-1426</strong>.';
      btn.parentNode.insertBefore(div, btn.nextSibling);
    }
  }
}
